<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Interface</title>

<style>
body{
    font-family:Arial;
    background:#08245a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:500px;
    background:white;
    padding:30px;
    border-radius:10px;
}

h1{
    color:#1f2d4d;
    border-bottom:2px solid lightgray;
    padding-bottom:10px;
}

#chatBox{
    height:350px;
    border:1px solid lightgray;
    border-radius:8px;
    padding:10px;
    background:#f8f8f8;
}

.message{
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    max-width:70%;
}

.sent{
    background:#08245a;
    color:white;
    margin-left:auto;
    text-align:right;
}

.received{
    background:#d9d9d9;
    color:black;
}

input{
    width:100%;
    padding:10px;
    margin-top:15px;
    box-sizing:border-box;
    border:1px solid lightgray;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#08245a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>
    <div class="container">
        <h1>Chat Interface</h1>
        <div id="chatBox"></div>
        <input type="text" id="message" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
        <script>
            let messages = [];
            function sendMessage(){
                let text = document.getElementById("message").value;
                if(text.trim() == "") {alert("Write a message!"); return;}
                messages.push({text:text, type:"sent"});
                document.getElementById("message").value = "";
                displayMessages();
                setTimeout(function(){ messages.push({text:"Message received", type:"received"}); displayMessages();} , 1000);
            }
            function displayMessages(){
                let output = "";
                for(let i=0;i<messages.length;i++){
                    output += `
                        <div class="message ${messages[i].type}">
                            ${messages[i].text}
                        </div>
                    `;
                }
                document.getElementById("chatBox").innerHTML = output;
            }
            displayMessages();
        </script>
    </div>
</body>
</html>

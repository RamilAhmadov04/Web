<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
body{
    font-family:Arial, Helvetica, sans-serif;
    background:#08245a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:700px;
    background:white;
    padding:30px;
    border-radius:10px;
}

h1{
    color:#1f2d4d;
    border-bottom:2px solid lightgray;
    padding-bottom:10px;
}

.card{
    border:1px solid lightgray;
    border-radius:8px;
    padding:15px;
    margin:15px 0;
    background:#f8f8f8;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
    border:1px solid lightgray;
    border-radius:5px;
}

button{
    padding:10px 15px;
    background:#08245a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.tasks{
    border:1px solid #ccc;
    border-radius:5px;
    padding:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
    </style>
</head>
<body>
    <div class = "container">
        <h1>Dashboard</h1>
        <div class = "card">
            <h3 id = "date">Date</h3>
        </div>
        <div class = "card">
            <h3 id = "weather">Weather</h3>
        </div>
        <div class = "card">
            <h3>Task</h3>
            <input type = "text" id="task" placeholder="Task">
            <button onclick = "addTask()">Add Task</button>
        </div>
        <hr>
        <div id = "taskList"></div>
        <script>
            let weatherData = [{
                city:"Baku",
                temperature:28,
                condition:"Sunny"
            }];
            let tasks = [];
            function addTask(){
                let task = document.getElementById("task").value;
                if(task.trim() == "") {alert("Write the task!"); return;}
                tasks.push({task: task});
                document.getElementById("task").value = "";
                displayTasks();
            }
            function deleteTask(index){
                tasks.splice(index, 1);
                displayTasks();
            }
            function displayTasks(){
                let output = "";
                for(let i = 0; i< tasks.length; i++){
                    output+=`
                        <div class = "tasks">
                            ${tasks[i].task}
                            <button onclick = "deleteTask(${i})">Delete</button>
                        </div>
                    `;
                }
                document.getElementById("taskList").innerHTML = output;
            }
            function displayDate(){
                let now = new Date();
                document.getElementById("date").innerHTML = "Date: " + now.toLocaleDateString() + " " + now.toLocaleTimeString();
            }
            setInterval(displayDate, 1000);
            function displayWeather(){
                document.getElementById("weather").innerHTML = `
                    <b>City:</b> ${weatherData[0].city}<br>
                    <b>Temperature:</b> ${weatherData[0].temperature} degrees<br>
                    <b>Condition:</b> ${weatherData[0].condition}
                `;
            }
            displayDate();
            displayWeather();
            displayTasks();
        </script>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart System</title>
    <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#08245a;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        margin:0;
    }

    .container{
        width:300px;
        margin:50px auto;
        background:white;
        padding:30px;
        border-radius:10px;
    }

    h1{
        color:#1f2d4d;
        font-size:32px;
        border-bottom:2px solid #d9d9d9;
        padding-bottom:15px;
    }

    input{
        padding: 10px;
        margin: 10px auto;
        border: 1px solid lightslategrey;
        border-radius: 5px;
        display: block;
        width: 80%;
    }

    button{
        padding: 10px;
        margin: auto;
        display: flex;
        justify-content: center;
    }
    .butt{
        padding: 10px;
        margin: 10px 0;
        display: flex;
    }
    </style>
</head>
<body>
    <div class = "container">
        <h1>Shopping Cart System</h1>
        <input type = "text" id = "item" placeholder="Item">
        <input type="number" id = "quantity" placeholder="Quantity">
        <input type="number" id = "cost" placeholder="Cost">
        <button onclick="addItem()">Add Item</button>
        <hr>
        <div id = "shoppingList"></div>
        <script>
            let cart = [];
            function addItem(){
                let item = document.getElementById("item").value;
                let quantity = Number(document.getElementById("quantity").value);
                let cost = Number(document.getElementById("cost").value);
                if(item.trim() == "") {alert("Write an item!"); return;}
                if(quantity <= 0) {alert("Write the quantity!"); return;}
                if(cost <= 0) {alert("Write the cost!"); return;}
                cart.push({item: item, quantity:quantity, cost:cost});
                document.getElementById("item").value = "";
                document.getElementById("quantity").value = "";
                document.getElementById("cost").value = "";
                displayItems();
            }
            function editQuantity(index){
                let newQuantity = prompt("Write new quantity: ", cart[index].quantity);
                if(newQuantity <= 0) {alert("Write the quantity!"); return;}
                cart[index].quantity = Number(newQuantity);
                displayItems();
            }
            function deleteItem(index){
                cart.splice(index, 1);
                displayItems();
            }
            function displayItems(){
                let output = "";
                let total = 0;
                for(let i = 0; i< cart.length; i++){
                    total += cart[i].quantity * cart[i].cost;
                    output+=`
                        <div class = "items">
                            ${cart[i].item} | ${cart[i].quantity}x | ${cart[i].cost}$
                            <button onclick = "editQuantity(${i})" class = "butt">Edit Quantity</button>
                            <button onclick = "deleteItem(${i})" class = "butt">Delete Item</button>
                        </div>
                        <br><br>
                    `;
                }
                output += `Total: ${total}`;
                document.getElementById("shoppingList").innerHTML = output;
            }
            displayItems();
        </script>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Course Registration System</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            min-height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: navy;
        }
        .course, .selected{
            background:#f8f9fc;
            border:1px solid #d6dce5;
            border-radius:8px;
            padding:12px;
            margin:10px 0;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        button{
            padding: 10px;
            margin: auto;
            display: flex;
            justify-content: center;
        }
        h1{
            font-size: large;
        }
        .container{
            background-color: aliceblue;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class = "container">
        <h1>Course Registartion</h1>
        <div id = "courseList"></div>
        <hr>
        <h3 id = "credits">Total Credits: 0</h3>
        <div id = "selectedList"></div>
        <script>
            let courses = [
                {name:"Data", credits: 6},
                {name:"Web", credits: 7},
                {name:"OS", credits: 8},
                {name:"Business", credits: 3},
                {name:"Electronics", credits: 6}
            ];
            let selectedCourses = [];
            function addCourse(index){
                for(let i = 0; i< selectedCourses.length; i++){
                    if(selectedCourses[i].name == courses[index].name) {alert("Course already selected!"); return;}
                }
                selectedCourses.push(courses[index]);
                displaySelected();
            }
            function deleteCourse(index){
                selectedCourses.splice(index, 1);
                displaySelected();
            }
            function displayCourses(){
                let output = "";
                for(let i = 0; i< courses.length; i++){
                    output+=`
                    <div class = "course">
                        Course: ${courses[i].name} (${courses[i].credits} credits)
                        <button onclick = "addCourse(${i})">Select Course</button>
                        <br><br>
                    </div>
                   `;
                }
                document.getElementById("courseList").innerHTML = output;
            }
            function displaySelected(){
                let output = "";
                let total = 0;
                for(let i = 0; i< selectedCourses.length; i++){
                    total += selectedCourses[i].credits;
                    output+=`
                        <div class = "selected">
                            Selected: ${selectedCourses[i].name} (${selectedCourses[i].credits} credits)
                            <button onclick = "deleteCourse(${i})">Delete Course</button>   
                        </div>
                    `;
                }
                document.getElementById("selectedList").innerHTML = output;
                document.getElementById("credits").innerHTML = "Total credits: " + total;
            }
            displayCourses();
        </script>
    </div>
</body>
</html>

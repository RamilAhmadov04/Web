<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <style>
        body{
    font-family: Arial, Helvetica, sans-serif;
    background:#08245a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:500px;
    background:white;
    padding:30px;
    border-radius:10px;
}

h1{
    color:#1f2d4d;
    font-size:32px;
    border-bottom:2px solid #d9d9d9;
    padding-bottom:15px;
}

input{
    padding:10px;
    margin:10px 0;
    border:1px solid lightslategrey;
    border-radius:5px;
    width:100%;
    box-sizing:border-box;
}

button{
    padding:8px 15px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#08245a;
    color:white;
}

button:hover{
    opacity:0.9;
}

.password{
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
    </style>
</head>
<body>
    <div class = "container">
    <h1>Password Manager</h1>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="addPassword()">Add</button>
    <input type = "text" id="searchbox" placeholder="Search" onkeyup="searchPassword()">
    <hr>
    <div id = "passwordList"></div>
    <script>
        let passwordList = JSON.parse(localStorage.getItem("passwords")) || [];
        let searchText = "";
        function addPassword(){
            let password = document.getElementById("password").value;
            if(password.trim() == "") {alert("Write the password!"); return;}
            passwordList.push({password: password});
            document.getElementById("password").value = "";
            saveData();
            displayPasswords();
        }
        function editPassword(index){
            let newPassword = prompt("Write new password:", passwordList[index].password);
            if(newPassword.trim() == "") {alert("Write the new password!"); return;}
            passwordList[index].password = newPassword;
            saveData();
            displayPasswords();
        }
        function deletePassword(index){
            passwordList.splice(index, 1);
            saveData();
            displayPasswords();
        }
        function saveData(){
            localStorage.setItem("passwords" ,JSON.stringify(passwordList));
        }
        function searchPassword(){
            searchText = document.getElementById("searchbox").value;
            displayPasswords(); 
        }
        function displayPasswords(){
            let output = "";
            for(let i = 0; i< passwordList.length; i++){
                if(!passwordList[i].password.toLowerCase().includes(searchText.toLowerCase())) continue;
                output+=`
                    <div class = "password">
                        ${passwordList[i].password};
                        <button onclick = "editPassword(${i})">Edit</button>
                        <button onclick = "deletePassword(${i})">Delete</button>    
                    </div>
                `;
                document.getElementById("passwordList").innerHTML = output;
            }
        }
        displayPasswords();
    </script>
    </div>
</body>
</html>

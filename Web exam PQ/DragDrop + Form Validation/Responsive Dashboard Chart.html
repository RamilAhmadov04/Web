<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
body{
    font-family:Arial, Helvetica, sans-serif;
    background:#08245a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:800px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h1{
    color:#1f2d4d;
    border-bottom:2px solid lightgray;
    padding-bottom:10px;
}

.chart{
    height:350px;
    border:1px solid lightgray;
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    background:#f8f9fc;
}

.bar{
    width:60px;
    background:#08245a;
    color:white;
    text-align:center;
    border-radius:5px 5px 0 0;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:5px;
}

.labels{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
    font-weight:bold;
}
    </style>
</head>
<body>
    <div class="container">
        <h1>Sales Dashboard</h1>
        <div id="chart" class="chart"></div>
        <div class="labels" id="labels"></div>
        <script>
            let months = ["Jan","Feb","Mar","Apr","May","Jun"];
            let sales = [120, 200, 150, 300, 250, 180];
            function displayChart(){
                let chartOutput = "";
                let labelOutput = "";
                for(let i=0;i<sales.length;i++){
                    chartOutput += `
                        <div class="bar" style="height:${sales[i]}px">${sales[i]}</div>
                    `;
                    labelOutput += `
                        <div>${months[i]}</div>
                    `;
                }
                document.getElementById("chart").innerHTML = chartOutput;
                document.getElementById("labels").innerHTML = labelOutput;
            }
            displayChart();
        </script>
    </div>
</body>
</html>

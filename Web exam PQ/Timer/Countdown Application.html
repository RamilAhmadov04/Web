<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Application</title>
    <style>
body{
    font-family:Arial;
    background:#08245a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    width:600px;
    background:white;
    padding:30px;
    border-radius:10px;
}

h1{
    color:#1f2d4d;
    border-bottom:2px solid lightgray;
    padding-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid lightgray;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    margin:5px;
    background:#08245a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.timers{
    border:1px solid lightgray;
    border-radius:5px;
    padding:10px;
    margin-top:10px;
    background:#f8f8f8;
}
    </style>
</head>
<body>
    <div class = "container">
        <h1>Countdown Application</h1>
        <input type = "number" id="time" placeholder="Set the time">
        <button onclick="addTimer()">Add Timer</button>
        <div id = "timerList"></div>
        <script>
            let timeList = [];
            setInterval(function(){
                for(let i=0;i<timeList.length;i++){
                    if(!timeList[i].paused && timeList[i].time > 0) timeList[i].time--;
                }
                displayTime();
            },1000);
            function addTimer(){
                let time = Number(document.getElementById("time").value);
                if(time <= 0) {alert("Write the time!"); return;}
                timeList.push({time: time, paused: false});
                document.getElementById("time").value = "";
                displayTime();
            }
            function deleteTimer(index){
                timeList.splice(index, 1);
                displayTime();
            }
            function pauseTimer(index){
                timeList[index].paused = !timeList[index].paused
                displayTime();
            }
            function displayTime(){
                let output = "";
                for(let i = 0; i< timeList.length; i++){
                    output+=`
                        <div class = "timers">
                            Time: ${timeList[i].time} seconds
                            <button onclick = "pauseTimer(${i})">Pause/Continue</button>
                            <button onclick = "deleteTimer(${i})">Delete</button>   
                        </div>
                    `;
                }
                document.getElementById("timerList").innerHTML = output;
            }
            displayTime();
        </script>
    </div>
</body>
</html>
